# configs/model_configs/patchtst.yaml
name: "patchtst"
class: "PatchTST"
framework: "neuralforecast"

hyperparameters:
  input_size: 104        # ~3.5 months lookback
  patch_len: 16
  stride: 8
  d_model: 128
  n_heads: 16
  d_ff: 256
  dropout: 0.2
  fc_dropout: 0.2
  head_dropout: 0.0
  learning_rate: 0.0001
  batch_size: 512
  max_epochs: 100

optuna:
  n_trials: 30
  direction: "minimize"
  metric: "val_rmsse"
  search_space:
    input_size: [52, 104, 208]
    patch_len: [8, 16, 24]
    stride: [4, 8, 16]
    d_model: [64, 128, 256]
    n_heads: [4, 8, 16]
    dropout: [0.1, 0.4]
    learning_rate: [1.0e-4, 1.0e-2]
