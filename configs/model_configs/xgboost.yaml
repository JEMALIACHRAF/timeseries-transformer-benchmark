# configs/model_configs/xgboost.yaml
name: "xgboost"
class: "XGBoostForecaster"
framework: "xgboost"

hyperparameters:
  n_estimators: 1000
  learning_rate: 0.05
  max_depth: 6
  min_child_weight: 1
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  objective: "reg:squarederror"
  eval_metric: "rmse"
  early_stopping_rounds: 50
  n_jobs: -1
  tree_method: "hist"

optuna:
  n_trials: 100
  direction: "minimize"
  metric: "val_rmse"
  search_space:
    n_estimators: [500, 2000]
    learning_rate: [0.01, 0.3]
    max_depth: [3, 10]
    min_child_weight: [1, 10]
    subsample: [0.5, 1.0]
    colsample_bytree: [0.5, 1.0]
    reg_alpha: [0.0, 1.0]
    reg_lambda: [0.5, 5.0]
